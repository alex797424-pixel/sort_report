<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; margin: 10px; background: #fff; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 160px; gap: 4px; background: #2c3e50; padding: 10px; border-radius: 8px; }
        .bar { background: #3498db; width: 15px; transition: 0.1s; }
        .active { background: #e74c3c !important; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <div class="canvas" id="canvas"></div>
    <div style="text-align:center; margin-top:10px;">
        <button onclick="init()">重置</button>
        <button onclick="startSort()">開始合併排序</button>
    </div>
    <script>
        let arr = [];
        const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 120) + 20);
            const c = document.getElementById('canvas');
            c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div');
                b.className = 'bar'; b.style.height = v + 'px';
                c.appendChild(b);
            });
        }

        async function merge(l, m, r) {
            let bars = document.getElementsByClassName('bar');
            let n1 = m - l + 1;
            let n2 = r - m;
            let L = arr.slice(l, m + 1);
            let R = arr.slice(m + 1, r + 1);

            let i = 0, j = 0, k = l;
            while (i < n1 && j < n2) {
                bars[k].classList.add('active');
                await new Promise(res => setTimeout(res, 50));
                if (L[i] <= R[j]) {
                    arr[k] = L[i++];
                } else {
                    arr[k] = R[j++];
                }
                bars[k].style.height = arr[k] + 'px';
                bars[k].classList.remove('active');
                bars[k].classList.add('done');
                k++;
            }
            while (i < n1) {
                arr[k] = L[i++];
                bars[k].style.height = arr[k] + 'px';
                bars[k].classList.add('done');
                k++;
            }
            while (j < n2) {
                arr[k] = R[j++];
                bars[k].style.height = arr[k] + 'px';
                bars[k].classList.add('done');
                k++;
            }
        }

        async function mergeSort(l, r) {
            if (l >= r) return;
            let m = Math.floor((l + r) / 2);
            await mergeSort(l, m);
            await mergeSort(m + 1, r);
            await merge(l, m, r);
        }

        async function startSort() {
            await mergeSort(0, size - 1);
        }
        init();
    </script>
</body>
</html>
