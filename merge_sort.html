<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 4px; background: #2c3e50; padding: 20px; border-radius: 8px; }
        .bar { background: #3498db; width: 20px; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <h3>✂️ 合併排序 (Merge Sort)</h3>
    <div class="canvas" id="canvas"></div>
    <p><button onclick="init()">重置</button> <button onclick="sort()">開始排序</button></p>
    <script>
        let arr = []; const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 150) + 20);
            const c = document.getElementById('canvas'); c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div'); b.className = 'bar';
                b.style.height = v + 'px'; c.appendChild(b);
            });
        }
        async function merge(l, m, r) {
            let bars = document.getElementsByClassName('bar');
            let left = arr.slice(l, m + 1); let right = arr.slice(m + 1, r + 1);
            let i = 0, j = 0, k = l;
            while (i < left.length && j < right.length) {
                await new Promise(res => setTimeout(res, 50));
                arr[k] = (left[i] <= right[j]) ? left[i++] : right[j++];
                bars[k].style.height = arr[k] + 'px'; bars[k].classList.add('done'); k++;
            }
            while (i < left.length) { arr[k] = left[i++]; bars[k].style.height = arr[k] + 'px'; bars[k].classList.add('done'); k++; }
            while (j < right.length) { arr[k] = right[j++]; bars[k].style.height = arr[k] + 'px'; bars[k].classList.add('done'); k++; }
        }
        async function sortRec(l, r) {
            if (l >= r) return;
            let m = Math.floor((l + r) / 2);
            await sortRec(l, m); await sortRec(m + 1, r); await merge(l, m, r);
        }
        async function sort() { await sortRec(0, size - 1); }
        init();
    </script>
</body>
</html>
