<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插入排序法</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input, button {
            margin: 10px 0;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>插入排序法</h1>
    <p>請輸入數字陣列（以逗號分隔，例如：5,3,8,6,2）：</p>
    <input type="text" id="arrayInput" placeholder="輸入數字陣列">
    <button onclick="performInsertionSort()">排序</button>
    <div class="result" id="result"></div>

    <script>
        function performInsertionSort() {
            // 取得使用者輸入的數字陣列
            const input = document.getElementById('arrayInput').value;
            const array = input.split(',').map(Number);

            // 插入排序法實現
            for (let i = 1; i < array.length; i++) {
                let key = array[i];
                let j = i - 1;

                // 將 key 插入到已排序部分的正確位置
                while (j >= 0 && array[j] > key) {
                    array[j + 1] = array[j];
                    j = j - 1;
                }
                array[j + 1] = key;
            }

            // 顯示排序結果
            document.getElementById('result').innerText = `排序結果：${array.join(', ')}`;
        }
    </script>
</body>
</html>
