<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #fff; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 160px; gap: 4px; background: #2c3e50; padding: 10px; border-radius: 8px; }
        .bar { background: #3498db; width: 15px; transition: 0.1s; }
        .active { background: #e74c3c !important; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <div class="canvas" id="canvas"></div>
    <div style="text-align:center; margin-top:10px;">
        <button onclick="init()">重置</button>
        <button onclick="sort()">開始氣泡排序</button>
    </div>
    <script>
        let arr = [];
        const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 120) + 20);
            const c = document.getElementById('canvas');
            c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div');
                b.className = 'bar'; b.style.height = v + 'px';
                c.appendChild(b);
            });
        }
        async function sort() {
            let bars = document.getElementsByClassName('bar');
            for(let i=0; i<size; i++) {
                for(let j=0; j<size-i-1; j++) {
                    bars[j].classList.add('active'); bars[j+1].classList.add('active');
                    if(arr[j] > arr[j+1]) {
                        await new Promise(r => setTimeout(r, 50));
                        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
                        bars[j].style.height = arr[j] + 'px';
                        bars[j+1].style.height = arr[j+1] + 'px';
                    }
                    bars[j].classList.remove('active'); bars[j+1].classList.remove('active');
                }
                bars[size-i-1].classList.add('done');
            }
        }
        init();
    </script>
</body>
</html>
