<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: white; margin: 0; padding: 10px; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 160px; gap: 4px; background: #2c3e50; padding: 10px; border-radius: 8px; }
        .bar { background: #3498db; width: 15px; transition: 0.1s; }
        .active { background: #e74c3c !important; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <div class="canvas" id="canvas"></div>
    <div style="margin-top:10px;">
        <button onclick="init()">重置</button>
        <button onclick="sort()">開始選擇排序</button>
    </div>
    <script>
        let arr = []; const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 120) + 20);
            const c = document.getElementById('canvas'); c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div'); b.className = 'bar';
                b.style.height = v + 'px'; c.appendChild(b);
            });
        }
        async function sort() {
            let bars = document.getElementsByClassName('bar');
            for(let i=0; i<size; i++) {
                let min = i; bars[i].classList.add('active');
                for(let j=i+1; j<size; j++) { if(arr[j] < arr[min]) min = j; }
                await new Promise(r => setTimeout(r, 100));
                [arr[i], arr[min]] = [arr[min], arr[i]];
                bars[i].style.height = arr[i] + 'px'; bars[min].style.height = arr[min] + 'px';
                bars[i].classList.remove('active'); bars[i].classList.add('done');
            }
        }
        init(); // 網頁開啟時先執行初始化
    </script>
</body>
</html>
