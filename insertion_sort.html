<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>插入排序模擬器</title>
    <style>
        /* 採用與氣泡排序一致的深色背景與全螢幕佈局 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* 網頁背景 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 動畫畫布區域：深藍色背景 */
        #data-container {
            width: 100%;
            max-width: 800px;
            height: 300px;
            background-color: #2c3e50; /* 深藍色畫布 */
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* 柱狀圖從底部長起 */
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        /* 柱狀圖樣式：綠色 */
        .bar {
            background-color: #2ecc71; /* 綠色 */
            margin: 0 2px;
            border-radius: 3px 3px 0 0;
            transition: height 0.2s ease, background-color 0.2s ease;
            /* 初始化寬度，會由 JS 根據數量動態調整 */
        }

        /* 正在比較或移動的柱子：紅色 */
        .bar.active {
            background-color: #e74c3c;
        }

        /* 已經定位好的柱子：維持綠色或稍淡 */
        .bar.sorted {
            background-color: #2ecc71;
        }

        /* 按鈕區域 */
        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #e9e9e9;
        }

        button:disabled {
            background-color: #f5f5f5;
            color: #aaa;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="data-container"></div>

    <div class="controls">
        <button onclick="resetArray()" id="resetBtn">重置</button>
        <button onclick="insertionSort()" id="sortBtn">開始插入排序</button>
    </div>

    <script>
        const container = document.getElementById('data-container');
        const sortBtn = document.getElementById('sortBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        let array = [];
        const ARRAY_SIZE = 25; // 柱子數量
        const MAX_HEIGHT = 280; // 最大高度 (px)
        const ANIMATION_SPEED = 100; // 毫秒 (越小越快)

        // 產生隨機陣列並渲染到畫面
        function resetArray() {
            array = [];
            container.innerHTML = ''; // 清空畫布
            
            for (let i = 0; i < ARRAY_SIZE; i++) {
                const value = Math.floor(Math.random() * (MAX_HEIGHT - 20)) + 20;
                array.push(value);
                
                const bar = document.createElement('div');
                bar.classList.add('bar');
                bar.style.height = `${value}px`;
                // 動態計算寬度以填滿容器
                bar.style.width = `${(100 / ARRAY_SIZE) - 1}%`; 
                bar.id = `bar-${i}`;
                container.appendChild(bar);
            }
            sortBtn.disabled = false;
        }

        // 輔助函式：等待一段時間 (用於動畫停頓)
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 更新特定柱子的外觀
        function updateBar(index, value, colorClass = '') {
            const bar = document.getElementById(`bar-${index}`);
            if (bar) {
                bar.style.height = `${value}px`;
                bar.className = `bar ${colorClass}`;
            }
        }

        // 插入排序核心邏輯 (含動畫)
        async function insertionSort() {
            sortBtn.disabled = true;
            resetBtn.disabled = true;
            
            const bars = document.getElementsByClassName('bar');
            
            // 第一支柱子預設視為已排序
            bars[0].classList.add('sorted');

            for (let i = 1; i < array.length; i++) {
                let key = array[i];
                let j = i - 1;
                
                // 標記目前要插入的柱子 (紅色)
                updateBar(i, key, 'active');
                await sleep(ANIMATION_SPEED);

                while (j >= 0 && array[j] > key) {
                    // 將較大的柱子右移
                    array[j + 1] = array[j];
                    
                    // 視覺化右移過程：把 j 的高度賦予 j+1，並標記為活動中
                    updateBar(j + 1, array[j], 'active');
                    await sleep(ANIMATION_SPEED);
                    
                    // 移完後，j 的位置恢復綠色 (因為它待會可能被更小的數覆蓋或變成 key 的位置)
                    bars[j].classList.remove('active');
                    bars[j].classList.add('sorted');

                    j = j - 1;
                }
                
                // 找到 key 的正確位置，插入 key
                array[j + 1] = key;
                updateBar(j + 1, key, 'sorted'); // 插入後標記為已排序 (綠色)
                await sleep(ANIMATION_SPEED);
            }
            
            // 全部排序完成，確保所有柱子都是綠色
            for(let bar of bars) {
                bar.className = 'bar sorted';
            }

            resetBtn.disabled = false;
        }

        // 初始化
        resetArray();
    </script>
</body>
</html>
