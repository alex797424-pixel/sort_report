<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #fff; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 160px; gap: 4px; background: #2c3e50; padding: 10px; border-radius: 8px; }
        .bar { background: #3498db; width: 15px; transition: 0.1s; }
        .active { background: #e74c3c !important; } /* 目前正在比較的柱子 */
        .done { background: #2ecc71 !important; }   /* 已排序完成的區域 */
    </style>
</head>
<body>
    <div class="canvas" id="canvas"></div>
    <div style="text-align:center; margin-top:10px;">
        <button onclick="init()">重置</button>
        <button onclick="sort()">開始插入排序</button>
    </div>
    <script>
        let arr = [];
        const size = 20;

        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 120) + 20);
            const c = document.getElementById('canvas');
            c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div');
                b.className = 'bar'; b.style.height = v + 'px';
                c.appendChild(b);
            });
        }

        async function sort() {
            let bars = document.getElementsByClassName('bar');
            
            // 第一根柱子預設為已排序
            bars[0].classList.add('done');

            for (let i = 1; i < size; i++) {
                let key = arr[i];
                let j = i - 1;

                // 標記當前要處理的柱子 (紅色)
                bars[i].classList.add('active');
                await new Promise(r => setTimeout(r, 100));

                // 將大於 key 的柱子往右移動，騰出位置
                while (j >= 0 && arr[j] > key) {
                    bars[j].classList.add('active'); // 標記正在比較的左側對象
                    
                    arr[j + 1] = arr[j];
                    // 關鍵：同步更新長條圖高度
                    bars[j + 1].style.height = arr[j] + 'px';
                    
                    await new Promise(r => setTimeout(r, 50));
                    
                    // 移動完後移除比較色，並確保它是綠色的 (因為它還在已排序區)
                    bars[j].classList.remove('active');
                    bars[j + 1].classList.add('done');
                    
                    j = j - 1;
                }
                
                // 將 key 插入正確位置
                arr[j + 1] = key;
                bars[j + 1].style.height = key + 'px';
                
                // 清除 active 色彩，標記這整段為 done
                bars[i].classList.remove('active');
                for(let k = 0; k <= i; k++) {
                    bars[k].classList.add('done');
                }
            }
        }

        init();
    </script>
</body>
</html>
