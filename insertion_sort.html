<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 4px; background: #2c3e50; padding: 20px; border-radius: 8px; }
        .bar { background: #3498db; width: 20px; }
        .active { background: #e74c3c !important; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <h3>📇 插入排序 (Insertion Sort)</h3>
    <div class="canvas" id="canvas"></div>
    <p><button onclick="init()">重置</button> <button onclick="sort()">開始排序</button></p>
    <script>
        let arr = []; const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 150) + 20);
            const c = document.getElementById('canvas'); c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div'); b.className = 'bar';
                b.style.height = v + 'px'; c.appendChild(b);
            });
        }
        async function sort() {
            let bars = document.getElementsByClassName('bar');
            for(let i=1; i<size; i++) {
                let key = arr[i]; let j = i - 1;
                bars[i].classList.add('active');
                while(j >= 0 && arr[j] > key) {
                    await new Promise(r => setTimeout(r, 50));
                    arr[j+1] = arr[j];
                    bars[j+1].style.height = arr[j+1] + 'px';
                    j--;
                }
                arr[j+1] = key; bars[j+1].style.height = key + 'px';
                bars[i].classList.remove('active');
                for(let k=0; k<=i; k++) bars[k].classList.add('done');
            }
        }
        init();
    </script>
</body>
</html>
