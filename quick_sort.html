<script>
    async function partition(l, r) {
        let bars = document.getElementsByClassName('bar');
        let pivot = arr[r];
        let i = l - 1;
        bars[r].classList.add('active');
        for (let j = l; j < r; j++) {
            if (arr[j] < pivot) {
                i++;
                [arr[i], arr[j]] = [arr[j], arr[i]];
                bars[i].style.height = arr[i] + 'px';
                bars[j].style.height = arr[j] + 'px';
                await new Promise(res => setTimeout(res, 50));
            }
        }
        [arr[i + 1], arr[r]] = [arr[r], arr[i + 1]];
        bars[i + 1].style.height = arr[i + 1] + 'px';
        bars[r].style.height = arr[r] + 'px';
        bars[r].classList.remove('active');
        bars[i + 1].classList.add('done');
        return i + 1;
    }

    async function sortRecursive(l, r) {
        if (l < r) {
            let pi = await partition(l, r);
            await sortRecursive(l, pi - 1);
            await sortRecursive(pi + 1, r);
        } else if (l === r) {
            document.getElementsByClassName('bar')[l].classList.add('done');
        }
    }

</script>
