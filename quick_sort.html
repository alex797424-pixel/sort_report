<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; }
        .canvas { display: flex; align-items: flex-end; justify-content: center; height: 200px; gap: 4px; background: #2c3e50; padding: 20px; border-radius: 8px; }
        .bar { background: #3498db; width: 20px; }
        .active { background: #e74c3c !important; }
        .done { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <h3>⚡ 快速排序 (Quick Sort)</h3>
    <div class="canvas" id="canvas"></div>
    <p><button onclick="init()">重置</button> <button onclick="sort()">開始排序</button></p>
    <script>
        let arr = []; const size = 20;
        function init() {
            arr = Array.from({length: size}, () => Math.floor(Math.random() * 150) + 20);
            const c = document.getElementById('canvas'); c.innerHTML = '';
            arr.forEach(v => {
                const b = document.createElement('div'); b.className = 'bar';
                b.style.height = v + 'px'; c.appendChild(b);
            });
        }
        async function partition(l, r) {
            let bars = document.getElementsByClassName('bar');
            let pivot = arr[r]; let i = l - 1; bars[r].classList.add('active');
            for (let j = l; j < r; j++) {
                if (arr[j] < pivot) {
                    i++; [arr[i], arr[j]] = [arr[j], arr[i]];
                    bars[i].style.height = arr[i] + 'px'; bars[j].style.height = arr[j] + 'px';
                    await new Promise(res => setTimeout(res, 50));
                }
            }
            [arr[i + 1], arr[r]] = [arr[r], arr[i + 1]];
            bars[i + 1].style.height = arr[i + 1] + 'px'; bars[r].style.height = arr[r] + 'px';
            bars[r].classList.remove('active'); bars[i + 1].classList.add('done');
            return i + 1;
        }
        async function sortRec(l, r) {
            if (l < r) {
                let pi = await partition(l, r);
                await sortRec(l, pi - 1); await sortRec(pi + 1, r);
            } else if (l === r) { document.getElementsByClassName('bar')[l].classList.add('done'); }
        }
        async function sort() { await sortRec(0, size - 1); }
        init();
    </script>
</body>
</html>
